<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../CSS/Cadastro.css">
</head>

<body>
    <div class="container">
        <h2>Criar Conta</h2>
        <p class="subtitle">Junte-se ao sistema!</p>

        <form id="cadastroForm">
            <div class="input-group">
                <input type="text" id="nome" placeholder="Nome Completo" required>
            </div>

            <div class="input-group">
                <input type="text" id="usuario" placeholder="Nome de Usuário" required>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="E-mail" required>
            </div>

            <div class="input-group">
                <div class="password-wrapper">
                    <input type="password" id="senha" placeholder="Senha" required>
                    <span class="toggle-password" data-target="senha">
                        <i class="eye-icon"></i>
                    </span>
                </div>
            </div>

            <div class="input-group">
                <div class="password-wrapper">
                    <input type="password" id="confirmaSenha" placeholder="Confirmar Senha" required>
                    <span class="toggle-password" data-target="confirmaSenha">
                        <i class="eye-icon"></i>
                    </span>
                </div>
                <small id="senhaErro" class="error-text"></small>
            </div>

            <button type="submit" id="btnSubmit" disabled>Cadastrar</button>

            <p class="footer-text">
                Já tem uma conta? <a href="login.html">Faça o login</a>
            </p>
        </form>
    </div>

    <script type="module" src="../JS/Cadastro.js"></script>
</body>

</html>
